<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.dark.css">
<style>
  .grid { display: grid; grid-template-columns: 140px 1fr; gap: 12px 24px; align-items: center; }
  .label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-4); line-height: 1; }
</style>
</head>
<body>
  <div class="grid">
    <div class="label">Eyebrow</div>
    <div class="pb-eyebrow">03 · Simulation</div>
    <div class="label">Mono</div>
    <div class="pb-mono">GET /api/projects/:id</div>
    <div class="label">Code</div>
    <div><span class="pb-code">string</span> <span class="pb-code">number</span> <span class="pb-code">boolean</span> <span class="pb-code">enum</span></div>
    <div class="label">Field row</div>
    <div style="display: flex; align-items: center; gap: 10px; font-family: var(--font-sans); font-size: 13px;">
      <span style="color: var(--fg-1); font-weight: 500;">email</span>
      <span style="font-family: var(--font-mono); font-size: 12px; color: var(--fg-3);">string</span>
      <span style="font-family: var(--font-mono); font-size: 11px; color: var(--success); background: var(--success-bg); padding: 2px 6px; border-radius: 4px;">required</span>
    </div>
  </div>
</body>
</html>
