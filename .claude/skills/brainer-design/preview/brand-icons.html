<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 20px 24px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px 14px; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .ic svg { width: 20px; height: 20px; stroke: #111110; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .name { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); letter-spacing: 0.02em; }
</style>
</head>
<body>
  <div class="ic"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/></svg><span class="name">layout</span></div>
  <div class="ic"><svg viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0 0 18 0V5"/><path d="M3 12a9 3 0 0 0 18 0"/></svg><span class="name">database</span></div>
  <div class="ic"><svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg><span class="name">zap</span></div>
  <div class="ic"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span class="name">user</span></div>
  <div class="ic"><svg viewBox="0 0 24 24"><path d="M12 5v14"/><path d="M5 12h14"/></svg><span class="name">plus</span></div>
  <div class="ic"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg><span class="name">chevron-down</span></div>

  <div class="ic"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg><span class="name">play</span></div>
  <div class="ic"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg><span class="name">pencil</span></div>
  <div class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg><span class="name">more</span></div>

  <div class="ic"><svg viewBox="0 0 24 24"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg><span class="name">type</span></div>
</body>
</html>
