<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 20px 24px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

  .btn {
    font-family: var(--font-sans);
    font-weight: 500;
    font-size: 13px;
    line-height: 1;
    padding: 9px 14px;
    border-radius: 8px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 120ms var(--ease-out);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: var(--signal-5); color: #fff; }
  .btn-primary:hover { background: var(--signal-6); }
  .btn-secondary { background: #FFFFFF; color: var(--fg-1); border-color: var(--border-hairline); box-shadow: var(--shadow-xs); }
  .btn-secondary:hover { background: var(--bg-hover); }
  .btn-ghost { background: transparent; color: var(--fg-2); }
  .btn-ghost:hover { background: var(--bg-hover); color: var(--fg-1); }
  .btn-danger { background: #FFFFFF; color: var(--danger); border-color: var(--border-hairline); }
  .btn-icon { padding: 8px; width: 32px; height: 32px; justify-content: center; background: #FFFFFF; border: 1px solid var(--border-hairline); border-radius: 8px; color: var(--fg-2); }
  .btn-icon:hover { background: var(--bg-hover); color: var(--fg-1); }
  .sm { font-size: 12px; padding: 6px 10px; }
  .lg { font-size: 14px; padding: 11px 18px; }
  svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>
  <div class="row" style="margin-bottom: 12px;">
    <button class="btn btn-primary">
      <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
      Generate prompt
    </button>
    <button class="btn btn-secondary">Save draft</button>
    <button class="btn btn-ghost">Cancel</button>
    <button class="btn btn-danger">Delete node</button>
    <button class="btn btn-icon" title="More"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg></button>
  </div>
  <div class="row">
    <button class="btn btn-primary sm">Add field</button>
    <button class="btn btn-secondary sm">Connect</button>
    <button class="btn btn-primary lg">Generate prompt</button>
  </div>
</body>
</html>
