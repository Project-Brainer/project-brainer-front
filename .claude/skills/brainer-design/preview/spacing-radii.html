<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .row { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .sample { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 72px; height: 48px; background: #FFFFFF; border: 1px solid var(--border-hairline); }
  .name { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); letter-spacing: 0.04em; }
  .val { font-family: var(--font-mono); font-size: 11px; color: var(--fg-1); font-weight: 500; }
</style>
</head>
<body>
  <div class="row">
    <div class="sample"><div class="box" style="border-radius: 3px;"></div><span class="name">xs</span><span class="val">3</span></div>
    <div class="sample"><div class="box" style="border-radius: 5px;"></div><span class="name">sm</span><span class="val">5</span></div>
    <div class="sample"><div class="box" style="border-radius: 8px;"></div><span class="name">md</span><span class="val">8</span></div>
    <div class="sample"><div class="box" style="border-radius: 12px;"></div><span class="name">lg</span><span class="val">12</span></div>
    <div class="sample"><div class="box" style="border-radius: 16px;"></div><span class="name">xl</span><span class="val">16</span></div>
    <div class="sample"><div class="box" style="border-radius: 20px;"></div><span class="name">2xl</span><span class="val">20</span></div>
    <div class="sample"><div class="box" style="border-radius: 999px;"></div><span class="name">pill</span><span class="val">999</span></div>
  </div>
</body>
</html>
