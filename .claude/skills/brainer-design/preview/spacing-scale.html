<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 6px; align-items: end; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box { background: var(--signal-2); width: 100%; border-radius: 4px; }
  .name { font-family: var(--font-mono); font-size: 9px; color: var(--fg-3); letter-spacing: 0.04em; }
  .px { font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); font-weight: 500; }
</style>
</head>
<body>
  <div class="grid">
    <div class="col"><div class="box" style="height: 2px;"></div><span class="name">1</span><span class="px">2</span></div>
    <div class="col"><div class="box" style="height: 4px;"></div><span class="name">2</span><span class="px">4</span></div>
    <div class="col"><div class="box" style="height: 8px;"></div><span class="name">3</span><span class="px">8</span></div>
    <div class="col"><div class="box" style="height: 12px;"></div><span class="name">4</span><span class="px">12</span></div>
    <div class="col"><div class="box" style="height: 16px;"></div><span class="name">5</span><span class="px">16</span></div>
    <div class="col"><div class="box" style="height: 20px;"></div><span class="name">6</span><span class="px">20</span></div>
    <div class="col"><div class="box" style="height: 24px;"></div><span class="name">7</span><span class="px">24</span></div>
    <div class="col"><div class="box" style="height: 32px;"></div><span class="name">8</span><span class="px">32</span></div>
    <div class="col"><div class="box" style="height: 40px;"></div><span class="name">9</span><span class="px">40</span></div>
    <div class="col"><div class="box" style="height: 48px;"></div><span class="name">10</span><span class="px">48</span></div>
    <div class="col"><div class="box" style="height: 64px;"></div><span class="name">11</span><span class="px">64</span></div>
    <div class="col"><div class="box" style="height: 96px;"></div><span class="name">12</span><span class="px">96</span></div>
  </div>
  <div style="margin-top: 14px; font-family: var(--font-sans); font-size: 12px; color: var(--fg-3);">4px base grid. Dense UI lives in <strong style="color: var(--fg-1);">3–7</strong>. Marketing breathes in <strong style="color: var(--fg-1);">10–12</strong>.</div>
</body>
</html>
