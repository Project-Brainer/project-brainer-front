<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.dark.css">
<style>
  .row { display: flex; align-items: baseline; gap: 24px; margin-bottom: 12px; }
  .row:last-child { margin-bottom: 0; }
  .label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-4); width: 120px; flex-shrink: 0; line-height: 1; }
  .specimen { color: var(--fg-1); }
</style>
</head>
<body>
  <div class="row">
    <div class="label">Display · 64</div>
    <div class="specimen pb-h1">Design your app, don't document it.</div>
  </div>
  <div class="row">
    <div class="label">Display · 44</div>
    <div class="specimen pb-h2">A canvas for builders.</div>
  </div>
  <div class="row">
    <div class="label">Display italic · 44</div>
    <div class="specimen" style="font-family: var(--font-display); font-size: 44px; font-style: italic; line-height: 1.15; letter-spacing: -0.02em;">structured but flexible.</div>
  </div>
</body>
</html>
