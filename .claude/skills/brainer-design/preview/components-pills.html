<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 20px 24px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .pill {
    display: inline-flex; align-items: center; gap: 5px;
    font-family: var(--font-sans); font-weight: 500; font-size: 11px;
    padding: 3px 8px; border-radius: 999px; line-height: 1.4;
  }
  .pill-mono { font-family: var(--font-mono); }
  .dot { width: 6px; height: 6px; border-radius: 50%; }

  .method { font-family: var(--font-mono); font-weight: 600; font-size: 10px; padding: 3px 7px; border-radius: 4px; letter-spacing: 0.04em; }
  .get    { background: #E8F5EE; color: #1F7A4A; }
  .post   { background: #F1ECFF; color: #4A32D1; }
  .patch  { background: #FFF4E0; color: #9A6A12; }
  .delete { background: #FCEAE8; color: #B8332A; }

  .conn { display: inline-flex; align-items: center; gap: 4px; background: #FFFFFF; border: 1px solid var(--border-hairline); padding: 3px 9px; border-radius: 999px; font-size: 11px; color: var(--fg-2); box-shadow: 0 1px 0 rgba(17,17,16,0.03); }
</style>
</head>
<body>
  <span class="pill" style="background: #EAF2FF; color: #1F4DB8;"><span class="dot" style="background: #1F4DB8;"></span>Screen</span>
  <span class="pill" style="background: #F1ECFF; color: #4A32D1;"><span class="dot" style="background: #4A32D1;"></span>UI Element</span>
  <span class="pill" style="background: #E8F5EE; color: #1F7A4A;"><span class="dot" style="background: #1F7A4A;"></span>API</span>
  <span class="pill" style="background: #FFF1E4; color: #9A4A12;"><span class="dot" style="background: #9A4A12;"></span>Data Model</span>
  <span class="pill" style="background: #FCE8F0; color: #9A2A5C;"><span class="dot" style="background: #9A2A5C;"></span>Role</span>

  <span style="width: 100%; height: 1px;"></span>

  <span class="method get">GET</span>
  <span class="method post">POST</span>
  <span class="method patch">PATCH</span>
  <span class="method delete">DELETE</span>

  <span style="width: 100%; height: 1px;"></span>

  <span class="conn">opens →</span>
  <span class="conn">calls API →</span>
  <span class="conn">reads data →</span>
  <span class="conn">writes data →</span>
  <span class="conn">updates →</span>
</body>
</html>
