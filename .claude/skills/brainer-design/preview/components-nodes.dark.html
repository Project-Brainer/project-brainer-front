<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.dark.css">
<style>
  body { padding: 20px 24px; background: #0E0E0C;
    background-image: radial-gradient(circle, #23231F 1px, transparent 1px);
    background-size: 16px 16px;
    display: flex; gap: 20px; align-items: center; flex-wrap: wrap;
  }
  .node {
    background: #181815; border-radius: 10px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.5), 0 4px 12px -2px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,250,0.07);
    font-family: var(--font-sans);
    min-width: 180px;
  }
  .node-selected {
    box-shadow: 0 1px 2px rgba(0,0,0,0.5), 0 8px 24px -4px rgba(141,123,255,0.4), 0 0 0 1.5px #8D7BFF;
  }
  .node-header {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 12px; font-size: 11px; font-weight: 500;
    border-top-left-radius: 10px; border-top-right-radius: 10px;
    border-bottom: 1px solid #23231F;
  }
  .node-body { padding: 10px 12px; font-size: 12px; color: #DCDCD3; }
  .node-title { font-weight: 500; font-size: 13px; color: #F7F7F2; margin-bottom: 2px; }
  .node-meta { font-family: 'Geist Mono', monospace; font-size: 11px; color: #999990; }
  .dot { width: 6px; height: 6px; border-radius: 50%; }
</style>
</head>
<body>
  <div class="node">
    <div class="node-header" style="background: #16243F; color: #8FB6FF;"><span class="dot" style="background:#8FB6FF;"></span>Screen</div>
    <div class="node-body">
      <div class="node-title">Login</div>
      <div class="node-meta">/auth/login</div>
    </div>
  </div>

  <div class="node node-selected">
    <div class="node-header" style="background: #2C1F12; color: #E0A66A;"><span class="dot" style="background:#E0A66A;"></span>Data Model</div>
    <div class="node-body">
      <div class="node-title">User</div>
      <div style="display: flex; flex-direction: column; gap: 3px; margin-top: 4px;">
        <div style="display:flex; justify-content: space-between;"><span>email</span><span class="node-meta">string</span></div>
        <div style="display:flex; justify-content: space-between;"><span>verified</span><span class="node-meta">boolean</span></div>
      </div>
    </div>
  </div>

  <div class="node">
    <div class="node-header" style="background: #142A20; color: #6FD49B;"><span class="dot" style="background:#6FD49B;"></span>API</div>
    <div class="node-body">
      <div style="display: flex; align-items: center; gap: 6px;">
        <span style="font-family: 'Geist Mono', monospace; font-weight: 600; font-size: 10px; padding: 3px 7px; border-radius: 4px; background: #211D44; color: #B0A4FF;">POST</span>
        <span class="node-meta">/api/auth</span>
      </div>
    </div>
  </div>
</body>
</html>
