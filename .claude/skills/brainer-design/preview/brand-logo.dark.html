<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.dark.css">
<style>
  body { padding: 24px 28px; display: flex; flex-direction: column; align-items: center; gap: 14px; background: #0E0E0C; }
  .mark { display: flex; align-items: center; gap: 20px; }
  /* invert the dark-on-light logo for dark surface */
  .mark img { height: 32px; filter: invert(1) hue-rotate(180deg); }
</style>
</head>
<body>
  <div class="mark">
    <img src="../assets/logo.svg" alt="Brainer mark" style="height: 44px;">
    <img src="../assets/logo-wordmark.svg" alt="Brainer wordmark" style="height: 28px;">
  </div>
  <div style="font-family: var(--font-sans); font-size: 11px; color: var(--fg-3); letter-spacing: 0.02em;">
    Two nodes connected to a signal-indigo terminal. The graph IS the mark.
  </div>
</body>
</html>
