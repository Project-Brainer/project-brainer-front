<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.dark.css">
<style>
  .row { display: flex; gap: 8px; }
  .swatch { flex: 1; aspect-ratio: 1.1 / 1; border-radius: 8px; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.04em; border: 1px solid rgba(255,255,250,0.06); }
  .hex { font-size: 10px; opacity: 0.85; }
  .name { font-weight: 600; }
  .light { color: #111110; }
  .dark { color: #F7F7F2; }
</style>
</head>
<body>
  <div class="row">
    <div class="swatch dark" style="background: #0E0E0C;"><span class="name">0</span><span class="hex">0E0E0C</span></div>
    <div class="swatch dark" style="background: #131311;"><span class="name">1</span><span class="hex">131311</span></div>
    <div class="swatch dark" style="background: #1A1A17;"><span class="name">2</span><span class="hex">1A1A17</span></div>
    <div class="swatch dark" style="background: #23231F;"><span class="name">3</span><span class="hex">23231F</span></div>
    <div class="swatch dark" style="background: #2E2E29;"><span class="name">4</span><span class="hex">2E2E29</span></div>
    <div class="swatch dark" style="background: #3D3D37;"><span class="name">5</span><span class="hex">3D3D37</span></div>
    <div class="swatch dark" style="background: #5A5A52;"><span class="name">6</span><span class="hex">5A5A52</span></div>
    <div class="swatch dark" style="background: #7A7A70;"><span class="name">7</span><span class="hex">7A7A70</span></div>
    <div class="swatch light" style="background: #999990;"><span class="name">8</span><span class="hex">999990</span></div>
    <div class="swatch light" style="background: #BCBCB2;"><span class="name">9</span><span class="hex">BCBCB2</span></div>
    <div class="swatch light" style="background: #DCDCD3;"><span class="name">10</span><span class="hex">DCDCD3</span></div>
    <div class="swatch light" style="background: #EDEDE6;"><span class="name">11</span><span class="hex">EDEDE6</span></div>
    <div class="swatch light" style="background: #F7F7F2;"><span class="name">12</span><span class="hex">F7F7F2</span></div>
  </div>
</body>
</html>
