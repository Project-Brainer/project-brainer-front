<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 20px 24px; background: #FDFDFC;
    background-image: radial-gradient(circle, #E5E5E1 1px, transparent 1px);
    background-size: 16px 16px;
    display: flex; gap: 20px; align-items: center; flex-wrap: wrap;
  }
  .node {
    background: #FFFFFF; border-radius: 10px;
    box-shadow: 0 1px 2px rgba(17,17,16,0.04), 0 4px 12px -2px rgba(17,17,16,0.06), 0 0 0 1px rgba(17,17,16,0.06);
    font-family: var(--font-sans);
    min-width: 180px;
  }
  .node-selected {
    box-shadow: 0 1px 2px rgba(17,17,16,0.04), 0 8px 20px -4px rgba(91,66,232,0.18), 0 0 0 1.5px #5B42E8;
  }
  .node-header {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 12px; font-size: 11px; font-weight: 500;
    border-top-left-radius: 10px; border-top-right-radius: 10px;
    border-bottom: 1px solid #EFEFEC;
  }
  .node-body { padding: 10px 12px; font-size: 12px; color: #2F2F2B; }
  .node-title { font-weight: 500; font-size: 13px; color: #111110; margin-bottom: 2px; }
  .node-meta { font-family: 'Geist Mono', monospace; font-size: 11px; color: #6B6B62; }
  .dot { width: 6px; height: 6px; border-radius: 50%; }
</style>
</head>
<body>
  <div class="node">
    <div class="node-header" style="background: #EAF2FF; color: #1F4DB8;"><span class="dot" style="background:#1F4DB8;"></span>Screen</div>
    <div class="node-body">
      <div class="node-title">Login</div>
      <div class="node-meta">/auth/login</div>
    </div>
  </div>

  <div class="node node-selected">
    <div class="node-header" style="background: #FFF1E4; color: #9A4A12;"><span class="dot" style="background:#9A4A12;"></span>Data Model</div>
    <div class="node-body">
      <div class="node-title">User</div>
      <div style="display: flex; flex-direction: column; gap: 3px; margin-top: 4px;">
        <div style="display:flex; justify-content: space-between;"><span>email</span><span class="node-meta">string</span></div>
        <div style="display:flex; justify-content: space-between;"><span>verified</span><span class="node-meta">boolean</span></div>
      </div>
    </div>
  </div>

  <div class="node">
    <div class="node-header" style="background: #E8F5EE; color: #1F7A4A;"><span class="dot" style="background:#1F7A4A;"></span>API</div>
    <div class="node-body">
      <div style="display: flex; align-items: center; gap: 6px;">
        <span style="font-family: 'Geist Mono', monospace; font-weight: 600; font-size: 10px; padding: 3px 7px; border-radius: 4px; background: #F1ECFF; color: #4A32D1;">POST</span>
        <span class="node-meta">/api/auth</span>
      </div>
    </div>
  </div>
</body>
</html>
