<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.dark.css">
<style>
  .row { display: flex; gap: 10px; }
  .chip { flex: 1; padding: 16px; border-radius: 10px; display: flex; flex-direction: column; gap: 6px; border: 1px solid rgba(255,255,250,0.06); }
  .title { font-family: var(--font-sans); font-weight: 500; font-size: 13px; }
  .hex { font-family: var(--font-mono); font-size: 10px; opacity: 0.75; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; vertical-align: 1px; }
</style>
</head>
<body>
  <div class="row">
    <div class="chip" style="background: #142A20; color: #6FD49B;">
      <span class="title"><span class="dot" style="background: #6FD49B;"></span>Success</span>
      <span class="hex">142A20 / 6FD49B</span>
    </div>
    <div class="chip" style="background: #2A2012; color: #E0B36A;">
      <span class="title"><span class="dot" style="background: #E0B36A;"></span>Warning</span>
      <span class="hex">2A2012 / E0B36A</span>
    </div>
    <div class="chip" style="background: #2C1614; color: #F08A82;">
      <span class="title"><span class="dot" style="background: #F08A82;"></span>Danger</span>
      <span class="hex">2C1614 / F08A82</span>
    </div>
  </div>
</body>
</html>
